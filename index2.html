<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Simple Music Player</title>
  <style>
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .player {
      background: #1e1e2f;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      width: 300px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    }
    .player h2 {
      margin-bottom: 10px;
    }
    audio {
      display: none;
    }
    .controls button {
      margin: 10px;
      padding: 10px 15px;
      font-size: 16px;
      border: none;
      border-radius: 50%;
      background: #0ff;
      color: #000;
      cursor: pointer;
      transition: background 0.3s;
    }
    .controls button:hover {
      background: #00cccc;
    }
  </style>
</head>
<body>
  <div class="player">
    <h2>🎵 Music Player</h2>
    <p id="song-name">Sample Song</p>

    <!-- Use a local or hosted MP3 file -->
    <audio id="audio" src="song.mp3"></audio>

    <div class="controls">
      <button onclick="prevSong()">⏮</button>
      <button onclick="togglePlay()">▶️</button>
      <button onclick="nextSong()">⏭</button>
    </div>
  </div>

  <script>
    const audio = document.getElementById("audio");
    const songName = document.getElementById("song-name");
    const playBtn = document.querySelector(".controls button:nth-child(2)");

    let songs = [
      { name: "Aaj ki raat", src: "song.mp3" },
      { name: "Aakhe gulabi", src: "song1.mp3" },
      { name: " Husan Toba-Toba", src: "song2.mp3" },
      { name: " Tujhe sine se lgake", src: "song3.mp3" }
      
      // You can add more songs here with direct MP3 links
    ];

    let currentSong = 0;

    function loadSong(index) {
      audio.src = songs[index].src;
      songName.textContent = songs[index].name;
    }

    function togglePlay() {
      if (audio.paused) {
        audio.play();
        playBtn.textContent = "⏸";
      } else {
        audio.pause();
        playBtn.textContent = "▶️";
      }
    }

    function prevSong() {
      currentSong = (currentSong - 1 + songs.length) % songs.length;
      loadSong(currentSong);
      audio.play();
      playBtn.textContent = "⏸";
    }

    function nextSong() {
      currentSong = (currentSong + 1) % songs.length;
      loadSong(currentSong);
      audio.play();
      playBtn.textContent = "⏸";
    }

    loadSong(currentSong);
  </script>
</body>
</html>
