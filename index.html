<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Music Player</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player {
      background: #1e1e2f;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    }

    .player h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }

    .controls button {
      padding: 12px;
      font-size: 16px;
      border: none;
      border-radius: 50%;
      background: #00ffff;
      color: #000;
      cursor: pointer;
      transition: background 0.3s;
    }

    .controls button:hover {
      background: #00cccc;
    }

    #seek-bar {
      width: 100%;
      margin: 10px 0;
      appearance: none;
      height: 5px;
      background: #444;
      border-radius: 5px;
      outline: none;
      cursor: pointer;
    }

    .song-list {
      max-height: 180px;
      overflow-y: auto;
      padding: 10px;
      background: #2e2e44;
      border-radius: 10px;
    }

    .song-item {
      padding: 8px 10px;
      margin-bottom: 6px;
      background: #3d3d5c;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .song-item:hover {
      background: #00cccc;
      color: black;
    }

    .song-item.active {
      background: #00ffff;
      color: black;
    }

    #time-display {
      font-size: 14px;
      color: #fff;
      margin-top: 8px;
      margin-bottom: 8px;
      text-align: center;
      font-family: monospace;
    }

    .toggle-controls {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .toggle-controls button {
      flex: 1;
      margin: 5px;
    }
  </style>
</head>
<body>

<div class="player">
  <h2>🎧 Music Player</h2>
  <p id="current-song">Now Playing: -</p>

  <div class="controls">
    <button onclick="prevSong()"><i class="fas fa-backward"></i></button>
    <button onclick="togglePlay()" id="play-btn"><i class="fas fa-play"></i></button>
    <button onclick="nextSong()"><i class="fas fa-forward"></i></button>
  </div>

  <div class="controls">
    <button onclick="seekBackward()"><i class="fas fa-rotate-left"></i> 10s</button>
    <button onclick="seekForward()">10s <i class="fas fa-rotate-right"></i></button>
  </div>

  <input type="range" id="seek-bar" value="0" min="0" max="100" step="1" />
  <div id="time-display">00:00 / 00:00</div>

  <div class="toggle-controls">
    <button onclick="toggleShuffle()" id="shuffle-btn"><i class="fas fa-random"></i></button>
    <button onclick="toggleRepeat()" id="repeat-btn"><i class="fas fa-redo"></i></button>
  </div>

  <div class="song-list" id="song-list">
    <!-- Songs will be injected here -->
  </div>

  <audio id="audio"></audio>
</div>

<script>
  const audio = document.getElementById("audio");
  const currentSongTitle = document.getElementById("current-song");
  const playBtn = document.getElementById("play-btn");
  const songListEl = document.getElementById("song-list");
  const seekBar = document.getElementById("seek-bar");
  const timeDisplay = document.getElementById("time-display");

  let songs = [
    { name: "Aaj ki raat", src: "song.mp3" },
    { name: "Aakhe gulabi", src: "song1.mp3" },
    { name: "Tujhe sine se lgake", src: "song3.mp3" },
    { name: "Husan Toba-Toba", src: "song2.mp3" }
  ];

  let currentIndex = 0;
  let isShuffle = false;
  let isRepeat = false;

  function loadSong(index) {
    const song = songs[index];
    audio.src = song.src;
    currentSongTitle.textContent = `Now Playing: ${song.name}`;
    updateActiveSong(index);
  }

  function togglePlay() {
    if (audio.paused) {
      audio.play();
      playBtn.innerHTML = '<i class="fas fa-pause"></i>';
    } else {
      audio.pause();
      playBtn.innerHTML = '<i class="fas fa-play"></i>';
    }
  }

  function nextSong() {
    if (isShuffle) {
      currentIndex = Math.floor(Math.random() * songs.length);
    } else {
      currentIndex = (currentIndex + 1) % songs.length;
    }
    loadSong(currentIndex);
    audio.play();
    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
  }

  function prevSong() {
    currentIndex = (currentIndex - 1 + songs.length) % songs.length;
    loadSong(currentIndex);
    audio.play();
    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
  }

  function updateActiveSong(index) {
    document.querySelectorAll(".song-item").forEach((item, i) => {
      item.classList.toggle("active", i === index);
    });
  }

  function createSongList() {
    songs.forEach((song, index) => {
      const item = document.createElement("div");
      item.className = "song-item";
      item.textContent = song.name;
      item.addEventListener("click", () => {
        currentIndex = index;
        loadSong(index);
        audio.play();
        playBtn.innerHTML = '<i class="fas fa-pause"></i>';
      });
      songListEl.appendChild(item);
    });
  }

  function seekBackward() {
    audio.currentTime = Math.max(0, audio.currentTime - 10);
  }

  function seekForward() {
    audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
  }

  seekBar.addEventListener("input", () => {
    const seekTo = (seekBar.value / 100) * audio.duration;
    audio.currentTime = seekTo;
  });

  function formatTime(time) {
    const minutes = Math.floor(time / 60);
    const seconds = Math.floor(time % 60).toString().padStart(2, '0');
    return `${minutes}:${seconds}`;
  }

  audio.addEventListener("timeupdate", () => {
    const progress = (audio.currentTime / audio.duration) * 100;
    seekBar.value = progress;
    const current = formatTime(audio.currentTime);
    const total = formatTime(audio.duration || 0);
    timeDisplay.textContent = `${current} / ${total}`;
  });

  // Play next song when current ends
  audio.addEventListener("ended", () => {
    if (isRepeat || isShuffle) {
      nextSong();
    } else if (currentIndex < songs.length - 1) {
      currentIndex++;
      loadSong(currentIndex);
      audio.play();
    } else {
      playBtn.innerHTML = '<i class="fas fa-play"></i>';
    }
  });

  function toggleShuffle() {
    isShuffle = !isShuffle;
    const btn = document.getElementById("shuffle-btn");
    btn.style.background = isShuffle ? "#00cccc" : "#00ffff";
  }

  function toggleRepeat() {
    isRepeat = !isRepeat;
    const btn = document.getElementById("repeat-btn");
    btn.style.background = isRepeat ? "#00cccc" : "#00ffff";
  }

  createSongList();
  loadSong(currentIndex);
</script>

</body>
</html>
