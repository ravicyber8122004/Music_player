<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Music Player</title>
  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player {
      background: #1e1e2f;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    }

    .player h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }

    .controls button {
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 50%;
      background: #00ffff;
      color: #000;
      cursor: pointer;
      transition: background 0.3s;
    }

    .controls button:hover {
      background: #00cccc;
    }

    .song-list {
      max-height: 180px;
      overflow-y: auto;
      padding: 10px;
      background: #2e2e44;
      border-radius: 10px;
    }

    .song-item {
      padding: 8px 10px;
      margin-bottom: 6px;
      background: #3d3d5c;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .song-item:hover {
      background: #00cccc;
      color: black;
    }

    .song-item.active {
      background: #00ffff;
      color: black;
    }
  </style>
</head>
<body>

<div class="player">
  <h2>🎧 Music Player</h2>
  <p id="current-song">Now Playing: -</p>

  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()">▶️</button>
    <button onclick="nextSong()">⏭</button>
  </div>

  <div class="song-list" id="song-list">
    <!-- Songs will be injected here -->
  </div>

  <audio id="audio"></audio>
</div>

<script>
  const audio = document.getElementById("audio");
  const currentSongTitle = document.getElementById("current-song");
  const playBtn = document.querySelector(".controls button:nth-child(2)");
  const songListEl = document.getElementById("song-list");

  let songs = [
    { name: "Aaj ki raat", src: "song.mp3" },
    { name: "Aakhe gulabi", src: "song1.mp3" },
    { name: "Tujhe sine se lgake", src: "song3.mp3" },
    { name: " Husan Toba-Toba", src: "song2.mp3" }
  ];

  let currentIndex = 0;

  function loadSong(index) {
    const song = songs[index];
    audio.src = song.src;
    currentSongTitle.textContent = `Now Playing: ${song.name}`;
    updateActiveSong(index);
  }

  function togglePlay() {
    if (audio.paused) {
      audio.play();
      playBtn.textContent = "⏸";
    } else {
      audio.pause();
      playBtn.textContent = "▶️";
    }
  }

  function nextSong() {
    currentIndex = (currentIndex + 1) % songs.length;
    loadSong(currentIndex);
    audio.play();
    playBtn.textContent = "⏸";
  }

  function prevSong() {
    currentIndex = (currentIndex - 1 + songs.length) % songs.length;
    loadSong(currentIndex);
    audio.play();
    playBtn.textContent = "⏸";
  }

  function updateActiveSong(index) {
    document.querySelectorAll(".song-item").forEach((item, i) => {
      item.classList.toggle("active", i === index);
    });
  }

  function createSongList() {
    songs.forEach((song, index) => {
      const item = document.createElement("div");
      item.className = "song-item";
      item.textContent = song.name;
      item.addEventListener("click", () => {
        currentIndex = index;
        loadSong(index);
        audio.play();
        playBtn.textContent = "⏸";
      });
      songListEl.appendChild(item);
    });
  }

  createSongList();
  loadSong(currentIndex);
</script>

</body>
</html>
