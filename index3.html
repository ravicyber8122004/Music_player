<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Music Player</title>
  <style>
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .player {
      background: #1e1e2f;
      padding: 30px;
      border-radius: 15px;
      width: 350px;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    }

    .player h2 {
      text-align: center;
      margin-bottom: 15px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 20px 0;
    }

    .controls button {
      padding: 10px;
      font-size: 16px;
      border: none;
      border-radius: 50%;
      background: #00ffff;
      color: #000;
      cursor: pointer;
      transition: background 0.3s;
    }

   
    .controls button:hover {
      background: #00cccc;
    }
    #seek-bar {
  width: 100%;
  margin: 10px 0;
  appearance: none;
  height: 5px;
  background: #444;
  border-radius: 5px;
  outline: none;
  cursor: pointer;
}


    .song-list {
      max-height: 180px;
      overflow-y: auto;
      padding: 10px;
      background: #2e2e44;
      border-radius: 10px;
    }

    .song-item {
      padding: 8px 10px;
      margin-bottom: 6px;
      background: #3d3d5c;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .song-item:hover {
      background: #00cccc;
      color: black;
    }

    .song-item.active {
      background: #00ffff;
      color: black;
    }

    #time-display {
  font-size: 14px;
  color: #fff;
  margin-top: 8px;
  margin-bottom: 8px;
  text-align: center;
  font-family: monospace;
}

  </style>
</head>
<body>

<div class="player">
  <h2>🎧 Music Player</h2>
  <p id="current-song">Now Playing: -</p>
 
  <div class="controls">
    <button onclick="prevSong()">⏮</button>
    <button onclick="togglePlay()">▶️</button>
    <button onclick="nextSong()">⏭</button>
  
  </div>

    <!-- Seek Controls -->
     <div class="controls" style="display: flex;flex-direction: row;align-items: center;justify-content: space-between;"> 
    <button onclick="seekBackward()">⏪ 10s</button>
<button onclick="seekForward()">10s ⏩</button>
</div>

  <!-- Seek Bar -->
<input type="range" id="seek-bar" value="0" min="0" max="100" step="1" />

<!-- Time Display -->
<div id="time-display">00:00 / 00:00</div>


  <div class="song-list" id="song-list">
    <!-- Songs will be injected here -->
  </div>

  <audio id="audio"></audio>
</div>

<script>
  const audio = document.getElementById("audio");
  const currentSongTitle = document.getElementById("current-song");
  const playBtn = document.querySelector(".controls button:nth-child(2)");
  const songListEl = document.getElementById("song-list");

  let songs = [
    { name: "Aaj ki raat", src: "song.mp3" },
    { name: "Aakhe gulabi", src: "song1.mp3" },
    { name: "Tujhe sine se lgake", src: "song3.mp3" },
    { name: " Husan Toba-Toba", src: "song2.mp3" }
  ];

  let currentIndex = 0;

  function loadSong(index) {
    const song = songs[index];
    audio.src = song.src;
    currentSongTitle.textContent = `Now Playing: ${song.name}`;
    updateActiveSong(index);
  }

  function togglePlay() {
    if (audio.paused) {
      audio.play();
      playBtn.textContent = "⏸";
    } else {
      audio.pause();
      playBtn.textContent = "▶️";
    }
  }

  function nextSong() {
    currentIndex = (currentIndex + 1) % songs.length;
    loadSong(currentIndex);
    audio.play();
    playBtn.textContent = "⏸";
  }

  function prevSong() {
    currentIndex = (currentIndex - 1 + songs.length) % songs.length;
    loadSong(currentIndex);
    audio.play();
    playBtn.textContent = "⏸";
  }

  function updateActiveSong(index) {
    document.querySelectorAll(".song-item").forEach((item, i) => {
      item.classList.toggle("active", i === index);
    });
  }

  function createSongList() {
    songs.forEach((song, index) => {
      const item = document.createElement("div");
      item.className = "song-item";
      item.textContent = song.name;
      item.addEventListener("click", () => {
        currentIndex = index;
        loadSong(index);
        audio.play();
        playBtn.textContent = "⏸";
      });
      songListEl.appendChild(item);
    });
  }

  createSongList();
  loadSong(currentIndex);

//   const audio = document.getElementById("audio"); // your audio element
const seekBar = document.getElementById("seek-bar");

// Update seek bar as the song plays
audio.addEventListener("timeupdate", () => {
  const progress = (audio.currentTime / audio.duration) * 100;
  seekBar.value = progress;
});

// Seek song when user drags seek bar
seekBar.addEventListener("input", () => {
  const seekTo = (seekBar.value / 100) * audio.duration;
  audio.currentTime = seekTo;
});

function seekBackward() {
  const audio = document.getElementById("audio");
  audio.currentTime = Math.max(0, audio.currentTime - 10);
}

function seekForward() {
  const audio = document.getElementById("audio");
  audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
}

// const audio = document.getElementById("audio");
const timeDisplay = document.getElementById("time-display");

function formatTime(time) {
  const minutes = Math.floor(time / 60);
  const seconds = Math.floor(time % 60).toString().padStart(2, '0');
  return `${minutes}:${seconds}`;
}

audio.addEventListener("timeupdate", () => {
  const current = formatTime(audio.currentTime);
  const total = formatTime(audio.duration || 0);
  timeDisplay.textContent = `${current} / ${total}`;
});


</script>

</body>
</html>
